<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Database · SpotRail HQ</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&family=Manrope:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; background: #07090C; color: #E8ECF2; font-family: Manrope, system-ui, sans-serif; }
  * { box-sizing: border-box; }
  ::selection { background: #40E0D0; color: #07090C; }
  a { color: inherit; }
  .row-hover:hover { background: rgba(255,255,255,0.035) !important; }
  details > summary { list-style: none; cursor: pointer; }
  details > summary::-webkit-details-marker { display: none; }

  /* Prevent CSS grid blowout: let every cell shrink below its content width
     so long builder/operator names can't push the other columns out of line. */
  .row-grid > * { min-width: 0; }

  /* Tablet — drop the lead-operator column */
  @media (max-width: 900px) {
    .row-grid { grid-template-columns: 104px 1fr 100px 132px 22px !important; gap: 14px !important; padding: 12px 18px !important; }
    .col-op { display: none !important; }
    .col-year { display: none !important; }
    .row-expanded-grid { grid-template-columns: 1fr !important; padding: 18px !important; gap: 14px !important; }
    .row-expanded { padding: 4px 14px 18px !important; }
    .col-class { font-size: 14px !important; line-height: 1.25 !important; }
  }
  /* Long class names wrap at spaces inside the column; a single word only
     breaks as a last resort if it genuinely can't fit (never splits otherwise). */
  .col-class { overflow-wrap: break-word; }

  /* Mobile — also drop traction chip + speed; show class + name only */
  @media (max-width: 560px) {
    .row-grid { grid-template-columns: 46px 1fr 22px !important; padding: 14px 14px !important; gap: 12px !important; }
    .col-speed { display: none !important; }
    .row-grid > :nth-child(3) { display: none !important; } /* traction chip */
    .col-class { font-size: 13px !important; line-height: 1.25 !important; }
  }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="shared.jsx?v=2"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
function useData() {
  const [d, setD] = React.useState(null);
  const [err, setErr] = React.useState(null);
  React.useEffect(() => {
    let cancelled = false;
    // Try several locations so the page works whether it's deployed at the
    // site root (srhq.uk/database.html → /data/…) or one level deep
    // (…/site/database.html → ../data/…). Each candidate must parse as real
    // JSON — this rejects hosts that answer unknown paths with an HTML 404 or
    // SPA-fallback page carrying a 200 status (which otherwise hangs forever).
    const candidates = [
      'data/site-data.json',
      '../data/site-data.json',
      '/data/site-data.json',
    ];
    (async () => {
      for (const url of candidates) {
        try {
          const r = await fetch(url, { cache: 'no-cache' });
          if (!r.ok) continue;
          const text = await r.text();
          let json;
          try { json = JSON.parse(text); }
          catch (e) { continue; } // got HTML / non-JSON — try the next path
          if (json && Array.isArray(json.categories)) {
            if (!cancelled) setD(json);
            return;
          }
        } catch (e) { /* network error — try the next candidate */ }
      }
      if (!cancelled) setErr('Could not load the rolling-stock data file (data/site-data.json). Make sure the data folder is uploaded alongside the site.');
    })();
    return () => { cancelled = true; };
  }, []);
  return { data: d, err };
}

// Detect traction kind from the traction string → chip color + label
function tractionKind(s = '') {
  const t = s.toLowerCase();
  if (t.includes('steam'))           return { k: 'Steam',        c: SRHQ.coral };
  if (t.includes('diesel-electric')) return { k: 'Diesel-elec',  c: SRHQ.amber };
  if (t.includes('bi-mode') || t.includes('tri-mode')) return { k: 'Bi/Tri-mode', c: SRHQ.lime };
  if (t.includes('diesel'))          return { k: 'Diesel',       c: SRHQ.amber };
  if (t.includes('battery'))         return { k: 'Battery',      c: SRHQ.lime };
  if (t.includes('electric'))        return { k: 'Electric',     c: SRHQ.turq };
  return { k: 'Other', c: SRHQ.inkDim };
}

function Chip({ color, children, solid = false }) {
  return (
    <span style={{
      display: 'inline-flex', alignItems: 'center', gap: 6,
      fontFamily: SRHQ.mono, fontSize: 10.5, letterSpacing: 1.2,
      textTransform: 'uppercase', color: solid ? SRHQ.bg : color,
      padding: '3px 8px', borderRadius: 999,
      background: solid ? color : `${color}15`,
      border: solid ? 'none' : `1px solid ${color}55`,
    }}>{children}</span>
  );
}

function Header() {
  return (
    <section style={{ maxWidth: 1280, margin: '0 auto', padding: '56px 32px 24px' }}>
      <div style={{ fontFamily: SRHQ.mono, fontSize: 11, letterSpacing: 3,
                    textTransform: 'uppercase', color: SRHQ.turq }}>Rolling-stock database</div>
      <h1 style={{ fontFamily: SRHQ.display, fontSize: 'clamp(40px, 5vw, 72px)',
                   fontWeight: 700, letterSpacing: -2.4, lineHeight: 1,
                   margin: '14px 0 0' }}>
        Every class on the<br/>
        <span style={{ color: SRHQ.turq, fontWeight: 500 }}>British</span> railway.
      </h1>
      <p style={{ fontSize: 17, color: SRHQ.inkDim, maxWidth: 620,
                  marginTop: 20, lineHeight: 1.55 }}>
        Filter by category, operator or traction. Click any row to open the full entry.
        Data verified April 2026 from Wikipedia, operator websites and railway press.
      </p>
    </section>
  );
}

function Tabs({ categories, active, onSelect }) {
  return (
    <div style={{ maxWidth: 1280, margin: '0 auto', padding: '8px 32px',
                  display: 'flex', gap: 8, flexWrap: 'wrap' }}>
      <button onClick={() => onSelect('all')} style={tabStyle('all' === active, SRHQ.ink)}>
        All categories
      </button>
      {categories.map(c => {
        const meta = CAT[c.name];
        return (
          <button key={c.name} onClick={() => onSelect(c.name)}
                  style={tabStyle(active === c.name, meta.color)}>
            <span style={{ width: 7, height: 7, borderRadius: '50%',
                            background: meta.color, display: 'inline-block', marginRight: 8 }} />
            {meta.short}
            <span style={{ marginLeft: 8, fontSize: 11, color: SRHQ.inkMute,
                           fontFamily: SRHQ.mono }}>{c.rows.length}</span>
          </button>
        );
      })}
    </div>
  );
}

function tabStyle(on, color) {
  return {
    padding: '10px 16px', borderRadius: 999,
    fontFamily: 'Manrope, sans-serif', fontSize: 13.5, fontWeight: 500,
    color: on ? SRHQ.bg : SRHQ.ink,
    background: on ? color : 'rgba(255,255,255,0.04)',
    border: `1px solid ${on ? color : SRHQ.line}`,
    cursor: 'pointer', transition: 'all .15s ease',
  };
}

function Toolbar({ query, setQuery, traction, setTraction, count }) {
  const options = ['All', 'Electric', 'Diesel', 'Diesel-elec', 'Bi/Tri-mode', 'Steam', 'Battery'];
  return (
    <div style={{ maxWidth: 1280, margin: '0 auto', padding: '16px 32px 8px',
                  display: 'flex', gap: 12, alignItems: 'center', flexWrap: 'wrap' }}>
      <div style={{ position: 'relative', flex: '1 1 320px', minWidth: 260 }}>
        <input value={query} onChange={e => setQuery(e.target.value)}
               placeholder="Search class, name, builder, operator…"
               style={{
                 width: '100%', padding: '12px 16px 12px 40px',
                 background: SRHQ.surface, border: `1px solid ${SRHQ.line}`,
                 borderRadius: 10, color: SRHQ.ink, fontSize: 14,
                 fontFamily: SRHQ.body, outline: 'none',
               }} />
        <span style={{ position: 'absolute', left: 14, top: '50%',
                       transform: 'translateY(-50%)', color: SRHQ.inkMute, fontSize: 14 }}>⌕</span>
      </div>
      <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
        {options.map(o => {
          const on = o === traction;
          const color = o === 'Electric' ? SRHQ.turq
                      : o === 'Diesel' || o === 'Diesel-elec' ? SRHQ.amber
                      : o === 'Bi/Tri-mode' ? SRHQ.lime
                      : o === 'Steam' ? SRHQ.coral
                      : o === 'Battery' ? SRHQ.lime
                      : SRHQ.ink;
          return (
            <button key={o} onClick={() => setTraction(o)} style={{
              padding: '8px 12px', borderRadius: 8,
              fontSize: 12, fontFamily: SRHQ.mono, letterSpacing: 0.5,
              color: on ? SRHQ.bg : color,
              background: on ? color : 'transparent',
              border: `1px solid ${on ? color : SRHQ.line}`,
              cursor: 'pointer',
            }}>{o}</button>
          );
        })}
      </div>
      <div style={{ marginLeft: 'auto', fontFamily: SRHQ.mono, fontSize: 12,
                    color: SRHQ.inkMute }}>{count} results</div>
    </div>
  );
}

// ——— Image panel — fetches a Wikipedia lead image via the summary API.
// Derives a Wikipedia article slug from the Commons Category URL in col 9.
// Falls back to a striped monospace placeholder if nothing comes back.
function deriveWikiTitle(commonsUrl, cls, name) {
  if (!commonsUrl) return null;
  // e.g. "commons.wikimedia.org/wiki/Category:British_Rail_Class_390" → "British_Rail_Class_390"
  const m = String(commonsUrl).match(/Category:([^?#]+)$/);
  if (m) return m[1];
  return null;
}

function TrainImage({ commonsUrl, cls, name, accent }) {
  const [state, setState] = React.useState({ status: 'loading', src: null, credit: null });
  const title = deriveWikiTitle(commonsUrl, cls, name);
  React.useEffect(() => {
    let cancelled = false;
    if (!title) { setState({ status: 'none' }); return; }
    const url = `https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(title)}`;
    fetch(url)
      .then(r => r.ok ? r.json() : Promise.reject(r.status))
      .then(j => {
        if (cancelled) return;
        const src = j.thumbnail?.source || j.originalimage?.source;
        if (src) setState({ status: 'ok', src, credit: title.replace(/_/g, ' ') });
        else setState({ status: 'none' });
      })
      .catch(() => { if (!cancelled) setState({ status: 'none' }); });
    return () => { cancelled = true; };
  }, [title]);

  const wrap = {
    position: 'relative', borderRadius: 12, overflow: 'hidden',
    background: `linear-gradient(135deg, ${accent}10, rgba(255,255,255,0.02))`,
    border: `1px solid ${SRHQ.line}`, aspectRatio: '16/10',
  };

  if (state.status === 'loading') {
    return (
      <div style={{ ...wrap, display: 'flex', alignItems: 'center', justifyContent: 'center',
                    color: SRHQ.inkMute, fontFamily: SRHQ.mono, fontSize: 11,
                    letterSpacing: 2, textTransform: 'uppercase' }}>
        loading image…
      </div>
    );
  }
  if (state.status !== 'ok') {
    return (
      <div style={{ ...wrap, display: 'flex', alignItems: 'center', justifyContent: 'center',
                    color: SRHQ.inkMute, fontFamily: SRHQ.mono, fontSize: 11,
                    letterSpacing: 2, textTransform: 'uppercase',
                    backgroundImage:
                      `repeating-linear-gradient(45deg, ${accent}10 0 10px, transparent 10px 20px)` }}>
        no image available
      </div>
    );
  }
  return (
    <div style={wrap}>
      <img src={state.src} alt={`${name} — ${cls}`}
           style={{ width: '100%', height: '100%', objectFit: 'cover', display: 'block' }}
           onError={() => setState({ status: 'none' })} />
      <div style={{
        position: 'absolute', bottom: 0, left: 0, right: 0,
        padding: '14px 12px 8px',
        background: 'linear-gradient(to top, rgba(7,9,12,0.92), transparent)',
        fontFamily: SRHQ.mono, fontSize: 10, letterSpacing: 0.6,
        color: SRHQ.inkMute,
      }}>
        Image via Wikipedia ·{' '}
        <a href={`https://en.wikipedia.org/wiki/${encodeURIComponent(title)}`}
           target="_blank" rel="noreferrer noopener"
           style={{ color: SRHQ.inkDim, textDecoration: 'underline' }}>
          {state.credit}
        </a>{' '}· CC BY-SA
      </div>
    </div>
  );
}

// ——— Row ————————————————————————————————————————————————————
function Row({ cat, header, row }) {
  const [open, setOpen] = React.useState(false);
  const meta = CAT[cat];
  // column indices follow the header. common: 0 class, 1 name, 2 traction,
  // 3 builder, 4 year, 5 speed, 6 operators, 7 route, 8 notes, 9 wiki
  const [cls, name, traction, builder, year, speed, operators, route, notes, wiki] = row;
  const tk = tractionKind(traction);
  const opFirst = (operators || '').split(';')[0].trim();

  return (
    <div style={{ borderBottom: `1px solid ${SRHQ.line}` }}>
      <button onClick={() => setOpen(o => !o)} className="row-hover row-grid" style={{
        width: '100%', textAlign: 'left', cursor: 'pointer',
        background: 'transparent', border: 'none', color: SRHQ.ink,
        padding: '14px 24px',
        display: 'grid',
        gridTemplateColumns: '136px 1fr 130px 110px 90px 1fr 28px',
        gap: 20, alignItems: 'center',
        transition: 'background .12s ease',
      }}>
        {/* Class number — big, colored */}
        <div className="col-class" style={{
          fontFamily: SRHQ.mono, fontSize: 16, fontWeight: 500,
          color: meta.color, letterSpacing: -0.3,
        }}>{cls}</div>

        {/* Name */}
        <div>
          <div style={{ fontFamily: SRHQ.display, fontSize: 16, fontWeight: 600,
                        color: SRHQ.ink, letterSpacing: -0.3 }}>{name}</div>
          <div style={{ fontSize: 12, color: SRHQ.inkMute, marginTop: 3,
                        whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{builder}</div>
        </div>

        <Chip color={tk.c}>{tk.k}</Chip>

        <div className="col-year" style={{ fontFamily: SRHQ.mono, fontSize: 12.5, color: SRHQ.inkDim }}>
          {year || '—'}
        </div>
        <div className="col-speed" style={{ fontFamily: SRHQ.mono, fontSize: 12.5, color: SRHQ.ink }}>
          {speed ? `${speed} mph` : '—'}
        </div>
        <div className="col-op" style={{ fontSize: 13, color: SRHQ.inkDim,
                      whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>
          {opFirst}
        </div>
        <div style={{ color: SRHQ.inkMute, fontSize: 14,
                      transition: 'transform .2s ease',
                      transform: open ? 'rotate(90deg)' : 'none' }}>›</div>
      </button>

      {open && (
        <div className="row-expanded" style={{ padding: '4px 24px 24px', background: 'rgba(255,255,255,0.015)' }}>
          <div className="row-expanded-grid" style={{ display: 'grid', gridTemplateColumns: '1.1fr 1fr 1fr', gap: 20,
                        padding: '20px 24px', borderRadius: 12,
                        background: SRHQ.surface, border: `1px solid ${SRHQ.line}`,
                        marginBottom: 12 }}>
            <TrainImage commonsUrl={wiki} cls={cls} name={name} accent={meta.color} />
            <div>
              <Field label="Traction" value={traction} color={tk.c} mono />
              <Field label="Builder" value={builder} />
              <Field label="Year introduced" value={year} mono />
              <Field label="Max speed" value={speed ? `${speed} mph` : '—'} mono color={SRHQ.amber} />
            </div>
            <div>
              <Field label="Operator(s)" value={operators} multi />
              <Field label="Primary route / service" value={route} />
            </div>
          </div>
          {notes && (
            <div style={{ padding: '16px 20px', borderRadius: 12,
                          background: `linear-gradient(135deg, ${meta.color}10, transparent 60%)`,
                          border: `1px solid ${meta.color}33` }}>
              <div style={{ fontFamily: SRHQ.mono, fontSize: 10.5, letterSpacing: 2,
                            textTransform: 'uppercase', color: meta.color, marginBottom: 8 }}>Notes</div>
              <div style={{ fontSize: 14, color: SRHQ.ink, lineHeight: 1.6 }}>{notes}</div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function Field({ label, value, color = SRHQ.ink, mono, multi }) {
  const val = value || '—';
  const parts = multi ? String(val).split(/;\s*/) : null;
  return (
    <div style={{ marginBottom: 14 }}>
      <div style={{ fontFamily: SRHQ.mono, fontSize: 10, letterSpacing: 2,
                    textTransform: 'uppercase', color: SRHQ.inkMute }}>{label}</div>
      <div style={{ fontFamily: mono ? SRHQ.mono : SRHQ.body, fontSize: 14,
                    color, marginTop: 6, lineHeight: 1.5 }}>
        {parts
          ? parts.map((p, i) => (
              <span key={i} style={{
                display: 'inline-block', padding: '3px 8px', margin: '2px 4px 2px 0',
                background: 'rgba(255,255,255,0.04)', borderRadius: 6,
                border: `1px solid ${SRHQ.line}`, fontSize: 12,
              }}>{p}</span>
            ))
          : val}
      </div>
    </div>
  );
}

function ColumnHead() {
  return (
    <div className="row-grid" style={{
      display: 'grid',
      gridTemplateColumns: '136px 1fr 130px 110px 90px 1fr 28px',
      gap: 20, alignItems: 'center',
      padding: '14px 24px',
      fontFamily: SRHQ.mono, fontSize: 10.5, letterSpacing: 2,
      textTransform: 'uppercase', color: SRHQ.inkMute,
      borderBottom: `1px solid ${SRHQ.line}`,
    }}>
      <span className="col-class">Class</span><span>Name / nickname</span><span>Traction</span>
      <span className="col-year">Year</span><span className="col-speed">Speed</span><span className="col-op">Lead operator</span><span></span>
    </div>
  );
}

function App() {
  const { data, err } = useData();
  const [active, setActive] = React.useState('all');
  const [query, setQuery] = React.useState('');
  const [traction, setTraction] = React.useState('All');

  if (err) {
    return (
      <>
        <TopNav current="database.html" />
        <div style={{ maxWidth: 620, margin: '0 auto', padding: '80px 32px',
                      textAlign: 'center' }}>
          <div style={{ fontFamily: SRHQ.mono, fontSize: 11, letterSpacing: 3,
                        textTransform: 'uppercase', color: SRHQ.coral }}>Data unavailable</div>
          <p style={{ fontSize: 16, color: SRHQ.inkDim, marginTop: 16, lineHeight: 1.6 }}>{err}</p>
          <button onClick={() => location.reload()} style={{
            marginTop: 20, padding: '10px 18px', borderRadius: 10,
            background: SRHQ.turq, color: SRHQ.bg, border: 'none',
            fontFamily: SRHQ.body, fontSize: 14, fontWeight: 600, cursor: 'pointer',
          }}>Retry</button>
        </div>
      </>
    );
  }

  if (!data) {
    return (
      <>
        <TopNav current="database.html" />
        <div style={{ padding: 60, textAlign: 'center', color: SRHQ.inkDim }}>Loading…</div>
      </>
    );
  }

  const q = query.trim().toLowerCase();
  const filterRow = (r) => {
    if (traction !== 'All' && tractionKind(r[2]).k !== traction) return false;
    if (q) {
      const hay = r.slice(0, 9).join(' ').toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  };

  const sectionsToRender = data.categories
    .filter(c => active === 'all' || c.name === active)
    .map(c => ({ ...c, filtered: c.rows.filter(filterRow) }));

  const total = sectionsToRender.reduce((s, c) => s + c.filtered.length, 0);

  return (
    <>
      <TopNav current="database.html" />
      <Header />
      <Tabs categories={data.categories} active={active} onSelect={setActive} />
      <Toolbar query={query} setQuery={setQuery} traction={traction} setTraction={setTraction} count={total} />

      <section style={{ maxWidth: 1280, margin: '0 auto', padding: '16px 32px 40px' }}>
        {sectionsToRender.map(c => {
          if (c.filtered.length === 0) return null;
          const meta = CAT[c.name];
          return (
            <details key={c.name} open style={{
              background: SRHQ.surface, border: `1px solid ${SRHQ.line}`,
              borderRadius: 16, marginBottom: 16, overflow: 'hidden',
            }}>
              <summary style={{
                padding: '18px 24px',
                display: 'flex', alignItems: 'center', justifyContent: 'space-between',
                borderBottom: `1px solid ${SRHQ.line}`,
              }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 14 }}>
                  <span style={{ width: 10, height: 10, borderRadius: '50%',
                                  background: meta.color,
                                  boxShadow: `0 0 0 4px ${meta.color}22` }} />
                  <span style={{ fontFamily: SRHQ.display, fontSize: 20, fontWeight: 600,
                                  letterSpacing: -0.5 }}>{c.name}</span>
                  <span style={{ fontFamily: SRHQ.mono, fontSize: 11, color: SRHQ.inkMute,
                                  letterSpacing: 1 }}>
                    {c.filtered.length} / {c.rows.length}
                  </span>
                </div>
                <span style={{ fontSize: 13, color: SRHQ.inkDim, maxWidth: 540,
                               textAlign: 'right' }}>{c.subtitle}</span>
              </summary>
              <ColumnHead />
              {c.filtered.map((r, i) => (
                <Row key={i} cat={c.name} header={c.header} row={r} />
              ))}
            </details>
          );
        })}

        {total === 0 && (
          <div style={{ padding: 60, textAlign: 'center', color: SRHQ.inkDim,
                        background: SRHQ.surface, border: `1px solid ${SRHQ.line}`,
                        borderRadius: 16 }}>
            No classes match those filters.
          </div>
        )}
      </section>
      <Footer />
      <CookieConsent />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
