<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet">
<script src="https://unpkg.com/pmtiles@4.4.1/dist/pmtiles.js"></script>
<style>html,body,#map{height:100%;margin:0}</style>
</head>
<body>
<div id="map"></div>
<script>
  maplibregl.addProtocol('pmtiles', new pmtiles.Protocol().tile);
  var map = new maplibregl.Map({
    container: 'map',
    style: {
      version: 8,
      sources: {},
      layers: [],
    },
    center: [-1.5, 53.5],
    zoom: 6,
  });
  window.__testResult = { status: 'pending' };
  map.on('load', function () {
    map.addSource('operators-vector', {
      type: 'vector',
      url: 'pmtiles://http://localhost:8937/operators.pmtiles',
    });
    map.addLayer({
      id: 'operators-lines',
      type: 'line',
      source: 'operators-vector',
      'source-layer': 'operators',
      paint: {
        'line-color': ['step', ['get', 'operator_count'], '#9AA4B2', 2, '#40E0D0', 6, '#F25CC1'],
        'line-width': 1.5,
      },
    });
    map.on('sourcedata', function (e) {
      if (e.sourceId === 'operators-vector' && e.isSourceLoaded) {
        var features = map.querySourceFeatures('operators-vector', { sourceLayer: 'operators' });
        window.__testResult = {
          status: 'loaded',
          hasLayer: !!map.getLayer('operators-lines'),
          featureCount: features.length,
          sampleProps: features.slice(0, 3).map(function (f) { return f.properties; }),
        };
      }
    });
  });
  map.on('error', function (e) {
    window.__testResult = { status: 'error', message: e.error ? e.error.message : String(e) };
  });
</script>
</body>
</html>
