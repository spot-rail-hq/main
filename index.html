<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>SpotRail HQ — UK Trains</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&family=Manrope:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; background: #07090C; color: #E8ECF2; font-family: Manrope, system-ui, sans-serif; }
  * { box-sizing: border-box; }
  ::selection { background: #40E0D0; color: #07090C; }
  a { color: inherit; }

  /* Mobile/tablet — collapse multi-column grids to one block per row.
     Inline styles still set grid-template-columns, so we override with !important. */
  @media (max-width: 900px) {
    .srhq-stats { grid-template-columns: 1fr 1fr !important; gap: 20px !important; }
    .srhq-features,
    .srhq-features-3,
    .srhq-spotlight { grid-template-columns: 1fr !important; gap: 16px !important; }
  }
  @media (max-width: 560px) {
    .srhq-stats { grid-template-columns: 1fr !important; }
  }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="shared.jsx"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
function Hero() {
  return (
    <section style={{ maxWidth: 1280, margin: '0 auto', padding: '96px 32px 72px',
                      position: 'relative' }}>
      <div style={{ fontFamily: SRHQ.mono, fontSize: 12,
                    color: SRHQ.turq, letterSpacing: 3, textTransform: 'uppercase',
                    display: 'inline-flex', alignItems: 'center', gap: 10,
                    padding: '6px 12px', border: `1px solid ${SRHQ.turq}44`,
                    borderRadius: 999, background: `${SRHQ.turq}10` }}>
        <span style={{ width: 6, height: 6, borderRadius: '50%', background: SRHQ.turq,
                       boxShadow: `0 0 0 4px ${SRHQ.turq}22` }} />
        Phase 1 · April 2026
      </div>

      <h1 style={{ fontFamily: SRHQ.display, fontSize: 'clamp(44px, 7vw, 104px)',
                   fontWeight: 700, letterSpacing: -3,
                   lineHeight: 0.95, margin: '28px 0 0', textWrap: 'pretty' }}>
        A home for<br/>
        <span style={{ color: SRHQ.turq, fontWeight: 500 }}>UK trains</span>
        <span style={{ color: SRHQ.inkDim }}>, clearly organised.</span>
      </h1>

      <p style={{ fontSize: 19, lineHeight: 1.55, color: SRHQ.inkDim,
                  maxWidth: 620, marginTop: 28, textWrap: 'pretty' }}>
        SpotRail HQ is an independent reference for Britain's railway. Browse every
        class of rolling stock, see who runs what, and explore the network as a single
        connected map.
      </p>

      <div style={{ display: 'flex', gap: 12, marginTop: 40, flexWrap: 'wrap' }}>
        <a href="database.html" style={{
          padding: '14px 22px', background: SRHQ.turq, color: SRHQ.bg,
          borderRadius: 10, textDecoration: 'none', fontWeight: 600, fontSize: 15,
        }}>Browse the database →</a>
        <a href="map.html" style={{
          padding: '14px 22px', background: 'transparent', color: SRHQ.ink,
          border: `1px solid ${SRHQ.lineStrong}`, borderRadius: 10,
          textDecoration: 'none', fontWeight: 500, fontSize: 15,
        }}>Open the network map</a>
      </div>

      {/* Ticker strip */}
      <div className="srhq-stats" style={{ marginTop: 80, padding: '18px 0',
                    borderTop: `1px solid ${SRHQ.line}`,
                    borderBottom: `1px solid ${SRHQ.line}`,
                    display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 24 }}>
        {[
          { k: 'Rolling-stock classes', v: '165+', c: SRHQ.turq },
          { k: 'Operators',              v: '28',   c: SRHQ.magenta },
          { k: 'Service categories',     v: '7',    c: SRHQ.amber },
          { k: 'Network coverage',       v: 'GB',   c: SRHQ.lime },
        ].map((x, i) => (
          <div key={i}>
            <div style={{ fontSize: 11, letterSpacing: 2, textTransform: 'uppercase',
                          color: SRHQ.inkMute, fontFamily: SRHQ.mono }}>{x.k}</div>
            <div style={{ fontFamily: SRHQ.display, fontSize: 36, fontWeight: 600,
                          letterSpacing: -1.5, marginTop: 6, color: x.c }}>{x.v}</div>
          </div>
        ))}
      </div>
    </section>
  );
}

function FeatureCard({ tag, tagColor, title, body, href, cta, children }) {
  const [hover, setHover] = React.useState(false);
  return (
    <a href={href} style={{ textDecoration: 'none', color: 'inherit' }}>
      <div onMouseEnter={() => setHover(true)} onMouseLeave={() => setHover(false)}
           style={{
        background: SRHQ.surface, border: `1px solid ${hover ? tagColor + '55' : SRHQ.line}`,
        borderRadius: 18, padding: 28, height: '100%',
        display: 'flex', flexDirection: 'column', gap: 20,
        transition: 'all .2s ease',
        transform: hover ? 'translateY(-2px)' : 'none',
      }}>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
          <span style={{ fontFamily: SRHQ.mono, fontSize: 11, letterSpacing: 2,
                         textTransform: 'uppercase', color: tagColor,
                         padding: '5px 10px', border: `1px solid ${tagColor}55`,
                         borderRadius: 999 }}>{tag}</span>
          <span style={{ fontSize: 20, color: hover ? tagColor : SRHQ.inkDim,
                         transition: 'all .2s ease',
                         transform: hover ? 'translateX(4px)' : 'none' }}>→</span>
        </div>
        <div style={{ flex: 1 }}>{children}</div>
        <div>
          <div style={{ fontFamily: SRHQ.display, fontSize: 30, fontWeight: 600,
                        letterSpacing: -1, lineHeight: 1.1, marginBottom: 10 }}>{title}</div>
          <div style={{ fontSize: 15, color: SRHQ.inkDim, lineHeight: 1.55, maxWidth: 460 }}>
            {body}
          </div>
          <div style={{ marginTop: 18, fontSize: 13, fontWeight: 600, color: tagColor,
                        letterSpacing: 0.2 }}>{cta}</div>
        </div>
      </div>
    </a>
  );
}

// Little visual teasers for each card
function DatabaseTeaser() {
  const rows = [
    { c: '390', n: 'Pendolino',     s: '125 mph', col: SRHQ.turq },
    { c: '800', n: 'Azuma / IET',   s: '125 mph', col: SRHQ.turq },
    { c: '170', n: 'Turbostar',     s: '100 mph', col: SRHQ.lime },
    { c: '66',  n: 'Shed',          s: '75 mph',  col: SRHQ.amber },
  ];
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 6, fontFamily: SRHQ.mono }}>
      {rows.map((r, i) => (
        <div key={i} style={{
          display: 'grid', gridTemplateColumns: '52px 1fr auto', gap: 12,
          alignItems: 'center', padding: '10px 12px',
          background: 'rgba(255,255,255,0.02)', border: `1px solid ${SRHQ.line}`,
          borderRadius: 8, fontSize: 13,
        }}>
          <span style={{ color: r.col, fontWeight: 600 }}>{r.c}</span>
          <span style={{ color: SRHQ.ink, fontFamily: SRHQ.body }}>{r.n}</span>
          <span style={{ color: SRHQ.inkMute, fontSize: 11 }}>{r.s}</span>
        </div>
      ))}
    </div>
  );
}

function MapTeaser() {
  return (
    <svg viewBox="0 0 320 180" style={{ width: '100%', height: 180 }}>
      <defs>
        <radialGradient id="mapglow" cx="50%" cy="50%" r="60%">
          <stop offset="0%" stopColor="#40E0D0" stopOpacity="0.18" />
          <stop offset="100%" stopColor="#40E0D0" stopOpacity="0" />
        </radialGradient>
      </defs>
      <rect width="320" height="180" fill="url(#mapglow)" />
      {/* Schematic lines */}
      <path d="M40 140 L80 100 L140 100 L180 70 L240 70 L290 40" stroke="#40E0D0" strokeWidth="2.2" fill="none" />
      <path d="M40 140 L100 140 L160 120 L220 120 L270 110" stroke="#F25CC1" strokeWidth="2.2" fill="none" />
      <path d="M80 100 L100 140" stroke="#B8F266" strokeWidth="2.2" fill="none" />
      <path d="M180 70 L160 120" stroke="#F5B84B" strokeWidth="2.2" fill="none" />
      {[
        [40,140,'#40E0D0'],[80,100,'#40E0D0'],[140,100,'#40E0D0'],[180,70,'#F5B84B'],
        [240,70,'#40E0D0'],[290,40,'#40E0D0'],[100,140,'#F25CC1'],[160,120,'#F5B84B'],
        [220,120,'#F25CC1'],[270,110,'#F25CC1'],
      ].map(([x,y,c], i) => (
        <g key={i}>
          <circle cx={x} cy={y} r="4" fill="#07090C" stroke={c} strokeWidth="1.8" />
        </g>
      ))}
    </svg>
  );
}

function FeaturedTeaser() {
  return (
    <div style={{ position: 'relative', padding: 18, borderRadius: 12,
                  background: `linear-gradient(135deg, ${SRHQ.amber}22, transparent 60%)`,
                  border: `1px solid ${SRHQ.amber}33`, fontFamily: SRHQ.mono }}>
      <div style={{ fontSize: 10, color: SRHQ.amber, letterSpacing: 2,
                    textTransform: 'uppercase' }}>Class 43 · HST</div>
      <div style={{ fontFamily: SRHQ.display, fontSize: 44, fontWeight: 700,
                    letterSpacing: -2, color: SRHQ.ink, lineHeight: 1, marginTop: 8 }}>
        148 <span style={{ color: SRHQ.inkMute, fontSize: 20, fontWeight: 400, fontFamily: SRHQ.mono }}>mph</span>
      </div>
      <div style={{ fontSize: 12, color: SRHQ.inkDim, marginTop: 6, fontFamily: SRHQ.body }}>
        Still the fastest diesel train in the world.
      </div>
    </div>
  );
}

function Features() {
  return (
    <section style={{ maxWidth: 1280, margin: '0 auto', padding: '48px 32px' }}>
      <div className="srhq-features" style={{ display: 'grid', gridTemplateColumns: '1.3fr 1fr', gap: 20 }}>
        <FeatureCard
          tag="Database" tagColor={SRHQ.turq}
          href="database.html"
          title="Every class of UK rolling stock"
          body="165+ classes across intercity, regional, commuter, freight, charter, metro and heritage — with operators, builders, traction and notes."
          cta="Open the database">
          <DatabaseTeaser />
        </FeatureCard>

        <FeatureCard
          tag="Map" tagColor={SRHQ.magenta}
          href="map.html"
          title="The network, at a glance"
          body="A schematic map of Britain's mainline routes. Tap a line to see its operator, typical journey times, and the classes that run it."
          cta="Explore the map">
          <MapTeaser />
        </FeatureCard>
      </div>

      {/* secondary row */}
      <div className="srhq-features-3" style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 20, marginTop: 20 }}>
        {[
          { tag: 'Operators', color: SRHQ.lime, title: 'Who runs what, where',
            body: 'From the big six TOCs to heritage lines — see operator fleets and route coverage.',
            cta: 'Coming phase 2' },
          { tag: 'Live departures', color: SRHQ.amber, title: 'Real-time arrivals',
            body: 'Once we have coverage, see live boards for any National Rail station — clean, calm, current.',
            cta: 'Coming phase 3' },
          { tag: 'Community', color: SRHQ.violet, title: 'For people who love trains',
            body: 'A quieter, better place to share sightings, photos and trip reports. Opt-in, no algorithm.',
            cta: 'Coming phase 4' },
        ].map((x, i) => (
          <div key={i} style={{
            background: SRHQ.surface, border: `1px solid ${SRHQ.line}`,
            borderRadius: 18, padding: 24,
          }}>
            <span style={{ fontFamily: SRHQ.mono, fontSize: 11, letterSpacing: 2,
                           textTransform: 'uppercase', color: x.color,
                           padding: '4px 9px', border: `1px solid ${x.color}44`,
                           borderRadius: 999 }}>{x.tag}</span>
            <div style={{ fontFamily: SRHQ.display, fontSize: 22, fontWeight: 600,
                          letterSpacing: -0.6, marginTop: 16, lineHeight: 1.15 }}>{x.title}</div>
            <div style={{ fontSize: 14, color: SRHQ.inkDim, marginTop: 10, lineHeight: 1.55 }}>{x.body}</div>
            <div style={{ marginTop: 16, fontSize: 12, color: SRHQ.inkMute,
                          fontFamily: SRHQ.mono, letterSpacing: 1.5, textTransform: 'uppercase' }}>{x.cta}</div>
          </div>
        ))}
      </div>
    </section>
  );
}

function Spotlight() {
  return (
    <section style={{ maxWidth: 1280, margin: '0 auto', padding: '48px 32px' }}>
      <div className="srhq-spotlight" style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 40,
                    padding: '40px 36px', borderRadius: 20,
                    background: `radial-gradient(ellipse at 100% 0%, ${SRHQ.magenta}18, transparent 60%), ${SRHQ.surface}`,
                    border: `1px solid ${SRHQ.line}` }}>
        <div>
          <div style={{ fontFamily: SRHQ.mono, fontSize: 11, letterSpacing: 2,
                        textTransform: 'uppercase', color: SRHQ.magenta }}>Class spotlight</div>
          <div style={{ fontFamily: SRHQ.display, fontSize: 48, fontWeight: 600,
                        letterSpacing: -2, lineHeight: 1.02, marginTop: 14 }}>
            The InterCity 125 is still<br/>on the main line.
          </div>
          <p style={{ fontSize: 16, color: SRHQ.inkDim, lineHeight: 1.6, marginTop: 18, maxWidth: 520 }}>
            Forty-six years after it entered service, the British Rail Class 43 —
            the world's fastest diesel — still runs ScotRail's Inter7City and a handful of
            charter duties. Start here if you want to understand how we got the modern
            British railway.
          </p>
          <a href="database.html#class-43" style={{
            display: 'inline-block', marginTop: 22, padding: '11px 18px',
            background: 'transparent', color: SRHQ.ink,
            border: `1px solid ${SRHQ.lineStrong}`, borderRadius: 10,
            textDecoration: 'none', fontWeight: 500, fontSize: 14,
          }}>See Class 43 entry →</a>
        </div>
        <div style={{ display: 'flex', alignItems: 'flex-end', justifyContent: 'flex-end' }}>
          {/* Monospace data card */}
          <div style={{ background: SRHQ.bg, border: `1px solid ${SRHQ.line}`,
                        borderRadius: 14, padding: 22, width: '100%',
                        fontFamily: SRHQ.mono, fontSize: 12.5, color: SRHQ.inkDim }}>
            <div style={{ display: 'grid', gridTemplateColumns: '120px 1fr', rowGap: 10, columnGap: 14 }}>
              <span>class</span>          <span style={{ color: SRHQ.ink }}>43 — HST</span>
              <span>traction</span>       <span style={{ color: SRHQ.ink }}>Diesel · MTU 16V 4000</span>
              <span>top speed</span>      <span style={{ color: SRHQ.amber }}>148 mph (record)</span>
              <span>in service</span>     <span style={{ color: SRHQ.ink }}>1975 →</span>
              <span>operators</span>      <span style={{ color: SRHQ.ink }}>ScotRail · Colas · RailAdventure</span>
              <span>status</span>         <span style={{ color: SRHQ.lime }}>● Partially active</span>
            </div>
          </div>
        </div>
      </div>
    </section>
  );
}

function App() {
  return (
    <>
      <TopNav current="index.html" />
      <Hero />
      <Features />
      <Spotlight />
      <Footer />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
