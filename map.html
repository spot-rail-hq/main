  }
  :root[data-theme="light"] {

    --ink-dim: #2D3748;
    --ink-mute: #4A5568;
    --line-rgb: 7,9,12;

    --color-accent-turquoise: #1A9E8F;  --color-accent-turquoise-rgb: 26,158,143;
    --color-accent-magenta: #C4237A;    --color-accent-magenta-rgb: 196,35,122;
    --color-accent-amber: #B8860B;      --color-accent-amber-rgb: 184,134,11;
    --color-accent-lime: #4A7C00;       --color-accent-lime-rgb: 74,124,0;
    --color-text-dimmed: #4A5568;
    --color-text-secondary: #2D3748;
  }
  *, *::before, *::after {

  }

  * { box-sizing: border-box; }
  ::selection { background: var(--color-accent-turquoise); color: #07090C; }
  a { color: inherit; }

  .theme-toggle {

    padding: 0; background: transparent; border: 1px solid rgba(var(--line-rgb),0.08);

<body>
<main>
<div id="root"></div>
<noscript>
  <div style="max-width:1280px;margin:0 auto;padding:32px;line-height:1.6">
    <h1>The British mainline network</h1>
    <p>
      Britain's principal passenger routes on a real map. SpotRail HQ's interactive map shows
      each line's operator, typical journey time, and the rolling-stock classes that work it.
    </p>
    <h2>Routes</h2>
    <ul>
      <li><strong>West Coast Main Line</strong> — Avanti West Coast · Caledonian Sleeper · LNR. London Euston ↔ Glasgow Central, 4h 10m.</li>
      <li><strong>East Coast Main Line</strong> — LNER · Lumo · Grand Central · Hull Trains. London King's Cross ↔ Edinburgh Waverley, 4h 20m.</li>
      <li><strong>Great Western Main Line</strong> — GWR · Heathrow Express. London Paddington ↔ Cardiff / Swansea.</li>
      <li><strong>Midland Main Line</strong> — East Midlands Railway. London St Pancras ↔ Sheffield, 2h.</li>
      <li><strong>CrossCountry</strong> — CrossCountry. Aberdeen ↔ Penzance, the longest scheduled journey in Britain.</li>
      <li><strong>South Western Main Line</strong> — South Western Railway. London Waterloo ↔ Exeter (West of England line).</li>
      <li><strong>Brighton Main Line</strong> — Southern · Thameslink · Gatwick Express. London Victoria / London Bridge ↔ Brighton, 55m.</li>
      <li><strong>High Speed 1 · Kent</strong> — Southeastern. London St Pancras ↔ Ashford / Dover via HS1.</li>
      <li><strong>Great Eastern Main Line</strong> — Greater Anglia. London Liverpool Street ↔ Norwich, 1h 50m.</li>
      <li><strong>TransPennine (North)</strong> — TransPennine Express · Northern. Liverpool ↔ Manchester ↔ Leeds ↔ Newcastle.</li>
      <li><strong>North Wales Coast Line</strong> — Avanti West Coast · Transport for Wales. Holyhead ↔ Crewe (→ London / Manchester).</li>
      <li><strong>Welsh Marches</strong> — Transport for Wales. Cardiff ↔ Shrewsbury ↔ Manchester.</li>
      <li><strong>Highland Main Line</strong> — ScotRail · Caledonian Sleeper. Edinburgh ↔ Perth ↔ Inverness.</li>
    </ul>
    <p>Click any route on the interactive map to see its operator, journey time, stations and the rolling-stock classes that run it.</p>
  </div>
</noscript>
</main>
<script type="text/babel">
function Header() {
  return (
    <section className="map-header" style={{ maxWidth: 1280, margin: '0 auto', padding: '56px 32px 20px' }}>
      <div style={{ fontFamily: SRHQ.mono, fontSize: 11, letterSpacing: 3,
                    textTransform: 'uppercase', color: SRHQ.turq }}>Network map</div>
      <h1 style={{ fontFamily: SRHQ.display, fontSize: 'clamp(40px, 5vw, 72px)',
                   fontWeight: 700, letterSpacing: -2.4, lineHeight: 1,
                   margin: '14px 0 0' }}>
        The British <span style={{ color: SRHQ.turq, fontWeight: 500 }}>mainline</span> network.
      </h1>
      <p style={{ fontSize: 17, color: SRHQ.inkDim, maxWidth: 640,
                  marginTop: 20, lineHeight: 1.55 }}>
        Britain's principal passenger routes on a real map. Click any line to see the
        operator, typical journey time, and the rolling-stock classes that work it.
      </p>
    </section>
  );
}

function Popup({ route, onClose }) {
  if (!route) return null;
  return (
    <div className="popup-card" style={{
      position: 'absolute', left: 20, top: 20, width: 340,
      transform: 'translateZ(0)', WebkitTransform: 'translateZ(0)',
      background: 'rgba(var(--surface-rgb),0.92)', backdropFilter: 'blur(14px)',
      WebkitBackdropFilter: 'blur(14px)',
      border: `1px solid ${colorAlpha(route.color, '55')}`, borderRadius: 16, padding: 20,
      boxShadow: `0 20px 60px rgba(0,0,0,0.5), 0 0 0 1px ${colorAlpha(route.color, '22')} inset`,
      fontFamily: SRHQ.body, zIndex: 600,
    }}>
      <button onClick={onClose} style={{
        position: 'absolute', top: 12, right: 12, background: 'transparent',
        border: 'none', color: SRHQ.inkDim, fontSize: 20, cursor: 'pointer',
      }}>×</button>
      <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
        <span style={{ width: 12, height: 12, borderRadius: 3, background: route.color,
                        boxShadow: `0 0 0 4px ${colorAlpha(route.color, '22')}` }} />
        <span style={{ fontFamily: SRHQ.mono, fontSize: 10.5, letterSpacing: 2,
                       textTransform: 'uppercase', color: route.color }}>Route</span>
      </div>
      <div style={{ fontFamily: SRHQ.display, fontSize: 22, fontWeight: 600,
                    letterSpacing: -0.7, marginTop: 10, lineHeight: 1.15 }}>{route.name}</div>
      <div style={{ fontSize: 13, color: SRHQ.inkDim, marginTop: 8, lineHeight: 1.55 }}>
        {route.journey}
      </div>
      <div className="popup-grid" style={{ marginTop: 16, display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
        <div>
          <div style={{ fontFamily: SRHQ.mono, fontSize: 10, letterSpacing: 2,
                        textTransform: 'uppercase', color: SRHQ.inkMute }}>Frequency</div>
          <div style={{ fontSize: 13, color: SRHQ.ink, marginTop: 4 }}>{route.freq}</div>
        </div>
        <div>
          <div style={{ fontFamily: SRHQ.mono, fontSize: 10, letterSpacing: 2,
                        textTransform: 'uppercase', color: SRHQ.inkMute }}>Stations</div>
          <div style={{ fontSize: 13, color: SRHQ.ink, marginTop: 4 }}>
            {route.path[0]} ↔ {route.path[route.path.length - 1]}
          </div>
        </div>
      </div>
      <div style={{ marginTop: 14 }}>
        <div style={{ fontFamily: SRHQ.mono, fontSize: 10, letterSpacing: 2,
                      textTransform: 'uppercase', color: SRHQ.inkMute }}>Operator(s)</div>
        <div style={{ fontSize: 13, color: SRHQ.ink, marginTop: 4, lineHeight: 1.5 }}>{route.operator}</div>
      </div>
      <div style={{ marginTop: 14 }}>
        <div style={{ fontFamily: SRHQ.mono, fontSize: 10, letterSpacing: 2,
                      textTransform: 'uppercase', color: SRHQ.inkMute, marginBottom: 8 }}>
          Classes on this route
        </div>
        <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
          {route.classes.map(c => (
            <a key={c} href={`database.html#class-${c}`} style={{
              padding: '5px 10px', borderRadius: 8, fontFamily: SRHQ.mono,
              fontSize: 12, color: route.color, textDecoration: 'none',
              background: colorAlpha(route.color, '14'), border: `1px solid ${colorAlpha(route.color, '44')}`,
            }}>{c}</a>
          ))}
        </div>
      </div>
      <div style={{ marginTop: 14, paddingTop: 14,
                    borderTop: `1px solid ${SRHQ.line}`,
                    fontSize: 13, color: SRHQ.inkDim, lineHeight: 1.55 }}>
        {route.about}
      </div>
    </div>
  );
}

function Legend({ active, setActive }) {
  return (
    <div className="legend-card" style={{
      position: 'absolute', right: 16, top: 16, width: 240, zIndex: 500,
      transform: 'translateZ(0)', WebkitTransform: 'translateZ(0)',
      background: 'rgba(var(--surface-rgb),0.85)', backdropFilter: 'blur(10px)',
      WebkitBackdropFilter: 'blur(10px)',
      border: `1px solid ${SRHQ.line}`, borderRadius: 14, padding: '14px 14px',
      fontFamily: SRHQ.body, maxHeight: 'calc(100% - 32px)', overflowY: 'auto',
    }}>
      <div style={{ fontFamily: SRHQ.mono, fontSize: 10, letterSpacing: 2,
                    textTransform: 'uppercase', color: SRHQ.inkMute,
                    marginBottom: 10 }}>Routes · {ROUTES.length}</div>
      {ROUTES.map(r => {
        const on = active === r.id;
        return (
          <button key={r.id} onClick={() => setActive(on ? null : r.id)}
                  style={{
            width: '100%', textAlign: 'left', display: 'flex',
            alignItems: 'center', gap: 10, padding: '6px 8px',
            background: on ? colorAlpha(r.color, '14') : 'transparent',
            border: `1px solid ${on ? colorAlpha(r.color, '55') : 'transparent'}`,
            borderRadius: 8, cursor: 'pointer', color: SRHQ.ink,
            marginBottom: 2, fontSize: 12.5, fontFamily: SRHQ.body,
          }}>
            <span style={{ width: 16, height: 3, borderRadius: 2, background: r.color,
                            flexShrink: 0 }} />
            <span style={{ flex: 1, whiteSpace: 'nowrap', overflow: 'hidden',
                            textOverflow: 'ellipsis' }}>{r.name}</span>
          </button>
        );
      })}
    </div>
  );
}

function RegionJump({ map }) {
  const regions = [
    { id: 'all',        name: 'All UK',      c: [54.5, -3.2],    z: 6 },
    { id: 'london',     name: 'London',      c: [51.5074, -0.1278], z: 11 },
    { id: 'birmingham', name: 'Birmingham',  c: [52.4778, -1.9],  z: 11 },
    { id: 'manchester', name: 'Manchester',  c: [53.4775, -2.2307], z: 11 },
    { id: 'glasgow',    name: 'Glasgow',     c: [55.8586, -4.2579], z: 11 },
    { id: 'edinburgh',  name: 'Edinburgh',   c: [55.9521, -3.1883], z: 11 },
  ];
  return (
    <div className="region-jump" style={{
      position: 'absolute', left: '50%', transform: 'translateX(-50%)',
      bottom: 16, zIndex: 500, display: 'flex', gap: 6,
      background: 'rgba(var(--surface-rgb),0.85)', backdropFilter: 'blur(10px)',
      WebkitBackdropFilter: 'blur(10px)',
      border: `1px solid ${SRHQ.line}`, borderRadius: 12, padding: 6,
    }}>
      <span style={{ alignSelf: 'center', padding: '0 8px 0 4px',
                     fontFamily: SRHQ.mono, fontSize: 10, letterSpacing: 2,
                     textTransform: 'uppercase', color: SRHQ.inkMute }}>Jump to</span>
      {regions.map(r => (
        <button key={r.id} onClick={() => map?.flyTo(r.c, r.z, { duration: 0.8 })}
                style={{
          background: 'transparent', border: `1px solid ${SRHQ.line}`,
          borderRadius: 8, padding: '6px 12px', cursor: 'pointer',
          color: SRHQ.ink, fontFamily: SRHQ.body, fontSize: 12.5,
        }}
        onMouseEnter={e => { e.currentTarget.style.background = 'rgba(var(--color-accent-turquoise-rgb),0.1)';
                             e.currentTarget.style.borderColor = colorAlpha(SRHQ.turq, '66'); }}
        onMouseLeave={e => { e.currentTarget.style.background = 'transparent';
                             e.currentTarget.style.borderColor = SRHQ.line; }}>
          {r.name}
        </button>
      ))}
    </div>
  );
}

function MapView({ active, setActive, setMap }) {
  const mapRef = React.useRef(null);
  const mapObj = React.useRef(null);
  const layersRef = React.useRef({ routes: {}, markers: {} });

  React.useEffect(() => {
    if (mapObj.current) return;
    const map = L.map(mapRef.current, {
      center: [54.5, -3.2], zoom: 6, minZoom: 5, maxZoom: 14,
      zoomControl: true, attributionControl: true,
      worldCopyJump: false,
    });
    mapObj.current = map;
    setMap(map);

    // CARTO Dark Matter — clean, neutral dark OSM basemap (no road coloring).
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/attributions">CARTO</a>',
      subdomains: 'abcd', maxZoom: 20,
    }).addTo(map);
    // City / town labels on top
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_only_labels/{z}/{x}/{y}{r}.png', {
      subdomains: 'abcd', maxZoom: 20,
    }).addTo(map);

    // Routes
    ROUTES.forEach(r => {
      // Use detailed geometry if provided; otherwise fall back to city-pair straight line.
      const latlngs = r.geometry && r.geometry.length
        ? r.geometry
        : r.path.map(s => STATIONS[s]).filter(Boolean);
      // soft glow underlay
      const glow = L.polyline(latlngs, { color: r.color, weight: 10, opacity: 0.18,
        lineCap: 'round', lineJoin: 'round', interactive: false }).addTo(map);
      const line = L.polyline(latlngs, { color: r.color, weight: 3.5, opacity: 0.95,
        lineCap: 'round', lineJoin: 'round' }).addTo(map);
      line.on('click', () => setActive(r.id));
      line.on('mouseover', () => { line.setStyle({ weight: 6 }); });
      line.on('mouseout', () => { line.setStyle({ weight: 3.5 }); });
      layersRef.current.routes[r.id] = { glow, line };
    });

    // Stations
    Object.entries(STATIONS).forEach(([name, ll]) => {
      const m = L.circleMarker(ll, {
        radius: 4, color: 'rgba(255,255,255,0.5)', weight: 1.8,
        fillColor: '#07090C', fillOpacity: 1,
      }).addTo(map);
      const label = L.marker(ll, {
        icon: L.divIcon({ className: '', html: `<div class="station-label">${name}</div>`,
          iconAnchor: [-6, 10] }),
        interactive: false,
      }).addTo(map);
      layersRef.current.markers[name] = { m, label };
    });

    return () => { map.remove(); mapObj.current = null; };
  }, []);

  // Respond to active route changes: dim others, highlight endpoints
  React.useEffect(() => {
    const { routes, markers } = layersRef.current;
    Object.entries(routes).forEach(([id, { glow, line }]) => {
      const dim = active && active !== id;
      line.setStyle({ opacity: dim ? 0.18 : 0.95 });
      glow.setStyle({ opacity: dim ? 0.05 : 0.18 });
    });
    const activeRoute = ROUTES.find(r => r.id === active);
    const endSet = new Set();
    const midSet = new Set();
    if (activeRoute) {
      endSet.add(activeRoute.path[0]);
      endSet.add(activeRoute.path[activeRoute.path.length - 1]);
      activeRoute.path.forEach(s => midSet.add(s));
    }
    Object.entries(markers).forEach(([name, { m, label }]) => {
      const isEnd = endSet.has(name);
      const isMid = midSet.has(name);
      const color = activeRoute?.color || 'rgba(255,255,255,0.5)';
      m.setStyle({
        radius: isEnd ? 7 : isMid ? 5 : 4,
        color: isEnd || isMid ? color : 'rgba(255,255,255,0.5)',
        weight: isEnd ? 3 : 1.8,
      });
      const el = label.getElement();
      if (el) {
        const inner = el.querySelector('.station-label');
        if (inner) {
          inner.classList.toggle('endpoint', isEnd);
          inner.style.display = (activeRoute && !isMid) ? 'none' : '';
        }
      }
    });
    // Fit bounds when a route is selected.
    // Leaflet padding is a Point [x, y]. The route detail popup sits over the
    // left of the map on desktop (~360px wide) and across the top on mobile, so
    // we pad asymmetrically to keep the whole route clear of it — and cap the
    // zoom so short routes (e.g. Brighton) don't blow up too close.
    if (activeRoute && mapObj.current) {
      const bounds = L.latLngBounds(
        (activeRoute.geometry && activeRoute.geometry.length
          ? activeRoute.geometry
          : activeRoute.path.map(s => STATIONS[s]))
      );
      const mobile = window.innerWidth <= 900;
      mapObj.current.flyToBounds(bounds, {
        paddingTopLeft: mobile ? [40, 300] : [380, 80],
        paddingBottomRight: [60, 80],
        maxZoom: 9,
        duration: 0.6,
      });
    }
  }, [active]);

  return <div ref={mapRef} style={{ position: 'absolute', inset: 0 }} />;
}

function App() {
  const [active, setActive] = React.useState(null);
  const [map, setMap] = React.useState(null);
  const route = ROUTES.find(r => r.id === active);

  return (
    <>
      <TopNav current="map.html" />
      <Header />

      <section className="map-section" style={{ maxWidth: 1280, margin: '0 auto', padding: '0 32px 40px' }}>
        <div className="map-frame" style={{
          position: 'relative',
          transform: 'translateZ(0)', WebkitTransform: 'translateZ(0)',
          background: SRHQ.surface, border: `1px solid ${SRHQ.line}`,
          borderRadius: 20, overflow: 'hidden', height: '78vh', minHeight: 600,
        }}>
          <MapView active={active} setActive={setActive} setMap={setMap} />
          <Legend active={active} setActive={setActive} />
          <RegionJump map={map} />
          {route && <Popup route={route} onClose={() => setActive(null)} />}
        </div>

        <div style={{ display: 'flex', gap: 16, marginTop: 16, flexWrap: 'wrap',
                      fontFamily: SRHQ.mono, fontSize: 11.5, color: SRHQ.inkMute,
                      letterSpacing: 0.5 }}>
          <span>Base map · OpenStreetMap via CARTO</span>
          <span>·</span>
          <span>Routes follow the actual railway corridors (hand-traced from OSM)</span>
          <span>·</span>
          <span>Click a line or use the legend to isolate a route</span>
        </div>
      </section>
      <Footer />
      <CookieConsent />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
